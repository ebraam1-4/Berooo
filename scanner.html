<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الكشاف السحري - مدرسة مار مرقس</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    
    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true' || localStorage.getItem('role') !== 'teacher') {
            window.location.href = "login.html";
        }
    </script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; min-height: 100vh; background: #11172a; color: #fff; padding: 2rem; display: flex; flex-direction: column; align-items: center; }
        .scanner-container { max-width: 500px; width: 100%; text-align: center; }
        h1 { color: #d4af37; font-size: 24px; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        p { font-size: 14px; color: rgba(255,255,255,0.6); margin-bottom: 1.5rem; }
        #reader { width: 100%; min-height: 300px; background: #1e293b; border: 2px dashed rgba(212,175,55,0.4); border-radius: 16px; overflow: hidden; margin-bottom: 1rem; }
        #reader__video { width: 100% !important; border-radius: 14px; }
        .btn-back-cam { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: rgba(212, 175, 55, 0.15); border: 1px solid rgba(212, 175, 55, 0.4); color: #d4af37; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer; margin-bottom: 1.5rem; }
        .welcome-card { background: rgba(255,255,255,0.05); border: 0.5px solid rgba(255,255,255,0.15); border-radius: 16px; padding: 2rem; display: none; margin-top: 1rem; }
        .student-name { font-size: 28px; color: #d4af37; font-weight: bold; }
        .student-streak { font-size: 15px; font-weight: bold; margin-top: 10px; }
        .btn-back { display: inline-flex; align-items: center; gap: 8px; margin-top: 1.5rem; padding: 10px 20px; background: rgba(255,255,255,0.06); border: 0.5px solid rgba(255,255,255,0.15); color: #fff; border-radius: 8px; text-decoration: none; }
        .error-box { background: rgba(239, 68, 68, 0.1); border: 1px dashed #ef4444; border-radius: 12px; padding: 15px; color: #f87171; margin-top: 1rem; display: none; }
    </style>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="auth.js"></script>
</head>
<body>

<div class="scanner-container">
    <h1><i class="ti ti-qrcode"></i> الكشاف السحري للتحضير</h1>
    <p>وجه الكاميرا نحو رمز الـ QR الموجود على كارنيه التلميذ</p>

    <div id="reader"></div>

    <button class="btn-back-cam" onclick="forceBackCamera()">
        <i class="ti ti-camera"></i> تشغيل الكاميرا الخلفية فقط
    </button>

    <div class="welcome-card" id="welcomeCard">
        <div class="student-name" id="cardName">أبونا فلان</div>
        <div class="student-group" id="cardGroup">مجموعة تلاميذ</div>
        <div class="student-streak" id="cardStreak"></div>
    </div>

    <div class="error-box" id="errorBox"></div>

    <a href="index.html" class="btn-back"><i class="ti ti-arrow-right"></i> العودة للرئيسية</a>
</div>

<script>
    let html5QrCode;
    let isProcessing = false;

    function onScanSuccess(decodedText, decodedResult) {
        if (isProcessing) return; 

        document.getElementById('errorBox').style.display = "none";
        document.getElementById('welcomeCard').style.display = "none";

        const dataParts = decodedText.split('|');
        if (dataParts.length < 2) {
            showError("⚠️ رمز QR غير صالح!");
            return;
        }

        isProcessing = true;
        const studentGroup = dataParts[0].trim();
        const studentName = dataParts[1].trim();

        const studentRef = database.ref('groups/' + studentGroup + '/' + studentName);

        studentRef.once('value').then((snapshot) => {
            if (snapshot.exists()) {
                const userData = snapshot.val();
                
                // القراءة بالأسماء العربي من الفايربيس
                let currentAttendance = userData.حضور !== undefined ? parseInt(userData.حضور) : 0;
                let currentAbsence = userData.غياب !== undefined ? parseInt(userData.غياب) : 0;
                
                let newAttendance = currentAttendance + 1;
                let newAbsence = currentAbsence - 1;
                if (newAbsence < 0) newAbsence = 0;

                // لو الغياب وصل 6، انقل لشجرة المفصولين
                if (currentAbsence >= 6) {
                    const firedRef = database.ref('fired_students/' + studentGroup + '/' + studentName);
                    firedRef.set({
                        "حضور": currentAttendance,
                        "غياب": currentAbsence,
                        "درجات": userData.درجات !== undefined ? userData.درجات : 0,
                        "الحالة": "مفصول لتجاوز حد الغياب"
                    }).then(() => {
                        studentRef.remove().then(() => {
                            showWelcome(studentName, studentGroup, "⚠️ تم نقل الطالب للمفصولين لتجاوز الغياب!", "#ef4444");
                        });
                    });
                } else {
                    // تحديث عادي بالعربي
                    studentRef.update({
                        "حضور": newAttendance,
                        "غياب": newAbsence,
                        "الحالة": "منتظم"
                    }).then(() => {
                        showWelcome(studentName, studentGroup, "✅ تم تسجيل الحضور بنجاح!", "#34d399");
                    });
                }
            } else {
                showError(`❌ الاسم "${studentName}" غير موجود في مجموعة "${studentGroup}"!`);
                isProcessing = false;
            }
        }).catch((err) => {
            showError("🚨 خطأ في الاتصال بالفايربيس!");
            isProcessing = false;
        });
    }

    function showWelcome(name, group, msg, color) {
        document.getElementById('cardName').textContent = name;
        document.getElementById('cardGroup').textContent = `مجموعة ${group}`;
        const streak = document.getElementById('cardStreak');
        streak.textContent = msg;
        streak.style.color = color;
        document.getElementById('welcomeCard').style.display = "block";
        
        if ('speechSynthesis' in window) {
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(name));
        }
        setTimeout(() => { document.getElementById('welcomeCard').style.display = "none"; isProcessing = false; }, 3000);
    }

    function showError(text) {
        const box = document.getElementById('errorBox');
        box.textContent = text;
        box.style.display = "block";
    }

    function startCamera(facingMode) {
        if (html5QrCode) {
            html5QrCode.stop().then(() => { initializeScanner(facingMode); }).catch(() => { initializeScanner(facingMode); });
        } else {
            initializeScanner(facingMode);
        }
    }

    function initializeScanner(facingMode) {
        html5QrCode = new Html5QrCode("reader");
        html5QrCode.start({ facingMode: facingMode }, { fps: 10, qrbox: { width: 250, height: 250 } }, onScanSuccess)
        .catch(() => { showError("🚨 اضغط على زرار تشغيل الكاميرا الخلفية لتفعيل الكشاف."); });
    }

    function forceBackCamera() { startCamera("environment"); }

    document.addEventListener("DOMContentLoaded", function() {
        setTimeout(() => { startCamera("environment"); }, 500);
    });
</script>
</body>
</html>
