<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بياناتي ودرجاتي - مدرسة مار مرقس</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    
    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = "login.html";
        }
    </script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #11172a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        #container { width: 100%; max-width: 1200px; padding: 2rem; }
        .card-wrapper { display: flex; justify-content: center; align-items: center; margin-top: 3rem; }
        .student-digital-card { background: linear-gradient(135deg, rgba(30, 41, 59, 0.9) 0%, rgba(15, 23, 42, 0.95) 100%); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 20px; width: 100%; max-width: 450px; padding: 2.5rem 2rem; box-shadow: 0 15px 35px rgba(0,0,0,0.5); text-align: center; }
        .status-badge { margin-top: 10px; padding: 6px 16px; border-radius: 50px; font-weight: bold; font-size: 14px; display: inline-block; }
        .status-active { background: rgba(52, 211, 153, 0.15); border: 1px solid #34d399; color: #34d399; }
        .status-fired { background: rgba(239, 68, 68, 0.15); border: 1px solid #ef4444; color: #f87171; }
        .display-name { font-size: 26px; font-weight: bold; color: #fff; margin-top: 1rem; }
        .display-group { font-size: 14px; color: #d4af37; margin-bottom: 1.5rem; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
        .stat-box { background: rgba(255,255,255,0.03); border: 0.5px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 1rem; }
        .stat-label { font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 6px; }
        .stat-value { font-size: 24px; font-weight: bold; }
        .btn-back-home { display: inline-flex; align-items: center; gap: 8px; margin-top: 2rem; padding: 10px 24px; background: rgba(255,255,255,0.05); border: 0.5px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); border-radius: 8px; text-decoration: none; }
    </style>
</head>
<body>

    <div id="container">
        <header>
            <div class="logo right-logo"><img src="img/preview.png" alt="شعار مدرسة مارمرقس" /></div>
            <div class="header-titles">
                <h1>مدرسة مار مرقس لتلمذة وإعداد الخدام</h1>
                <p class="subtitle">«الْحَصَادُ كَثِيرٌ وَلٰكِنَّ الْفَعَلَةَ قَلِيلُونَ»</p>
            </div>
            <div class="logo2 left-logo"><img src="img/logo2.png" alt="شعار الكنيسة" /></div>
        </header>

        <nav class="main-nav">
            <ul class="nav-tabs">
                <li class="nav-tab"><a href="index.html">🏠 الرئيسية</a></li>
                <li class="nav-tab"><a href="class.html">📖 محاضرات</a></li>
                <li class="nav-tab"><a href="coptic.html">⛪ قبطي</a></li>
                <li class="nav-tab"><a href="al7an.html">🎵 ألحان</a></li>
                <li class="nav-tab"><a href="mars.html">🎨 ممارسات</a></li>
                <li class="nav-tab"><a href="sleep.html">😴 صلاة المساء</a></li>
                <li class="nav-tab active"><a href="card.html">📊 درجاتي وغيابي</a></li>
            </ul>
        </nav>

        <div class="card-wrapper">
            <div class="student-digital-card">
                <div id="statusBadge" class="status-badge status-active">منتظم</div>
                <div class="display-name" id="studentNameDisplay">جاري التحميل...</div>
                <div class="display-group" id="studentGroupDisplay">مجموعة التلميذ</div>

                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-label"><i class="ti ti-calendar-check"></i> أيام الحضور</div>
                        <div class="stat-value" style="color: #34d399;" id="studentAttendanceDisplay">0</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label"><i class="ti ti-calendar-minus"></i> أيام الغياب</div>
                        <div class="stat-value" style="color: #f87171;" id="studentAbsenceDisplay">0</div>
                    </div>
                    <div class="stat-box" style="grid-column: span 2;">
                        <div class="stat-label"><i class="ti ti-trophy"></i> إجمالي الدرجات</div>
                        <div class="stat-value" style="color: #e8c84a;" id="studentGradesDisplay">0</div>
                    </div>
                </div>
                <a href="index.html" class="btn-back-home"><i class="ti ti-arrow-right"></i> العودة للرئيسية</a>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="auth.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const name = localStorage.getItem('studentName');
            const group = localStorage.getItem('studentGroup');

            if (name && group) {
                document.getElementById('studentNameDisplay').textContent = name;
                document.getElementById('studentGroupDisplay').textContent = `مجموعة ${group}`;

                database.ref('groups/' + group + '/' + name).on('value', (snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        document.getElementById('studentAttendanceDisplay').textContent = data.حضور || 0;
                        document.getElementById('studentAbsenceDisplay').textContent = data.غياب || 0;
                        document.getElementById('studentGradesDisplay').textContent = data.درجات || 0;
                        
                        const badge = document.getElementById('statusBadge');
                        if (data.الحالة === "منتظم") {
                            badge.textContent = "✅ منتظم";
                            badge.className = "status-badge status-active";
                        } else {
                            badge.textContent = "⚠️ مفصول لتجاوز الغياب";
                            badge.className = "status-badge status-fired";
                        }
                    }
                });
            }
        });
    </script>
</body>
</html>
